<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudyTrack — Entrar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: {
            brand: {
              500: '#6366f1',
              600: '#4f46e5',
            },
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300 min-h-screen flex items-center justify-center px-4">

  <button id="toggle-tema" class="absolute top-4 right-4 p-2 rounded-full bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
    <span id="icone-tema">🌙</span>
  </button>

  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-brand-600 dark:text-brand-500">StudyTrack</h1>
      <p class="text-slate-500 dark:text-slate-400 mt-1">Acompanhe sua evolução nos estudos</p>
    </div>

    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl shadow-slate-200/50 dark:shadow-none p-8 transition-colors">
      <div class="flex mb-6 bg-slate-100 dark:bg-slate-700 rounded-lg p-1">
        <button id="btn-login" class="flex-1 py-2 rounded-md text-sm font-medium bg-white dark:bg-slate-600 shadow transition-all">
          Entrar
        </button>
        <button id="btn-cadastro" class="flex-1 py-2 rounded-md text-sm font-medium text-slate-500 dark:text-slate-300 transition-all">
          Criar conta
        </button>
      </div>

      <form id="form-auth" class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input type="email" id="input-email" required
            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all" />
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Senha</label>
          <input type="password" id="input-senha" required minlength="6"
            class="w-full px-4 py-2.5 rounded-lg border border-slate-200 dark:border-slate-600 bg-slate-50 dark:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-brand-500 transition-all" />
        </div>

        <p id="mensagem-erro" class="text-sm text-red-500 hidden"></p>

        <button type="submit" id="btn-enviar"
          class="w-full py-2.5 rounded-lg bg-brand-600 hover:bg-brand-500 text-white font-medium transition-all active:scale-95">
          Entrar
        </button>
      </form>
    </div>
  </div>

  <script src="js/tema.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
